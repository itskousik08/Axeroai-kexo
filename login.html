<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kexo AI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#0B0F14; --card:#111827; --border:#1F2937;
      --text:#F9FAFB; --text2:#9CA3AF; --muted:#6B7280;
      --brand:#4F46E5; --brand-h:#4338CA;
      --success:#22C55E; --error:#EF4444;
    }
    body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      -webkit-font-smoothing:antialiased;padding:24px;}

    .auth-wrap{width:100%;max-width:420px}

    .auth-logo{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:36px}
    .auth-logo img{height:36px;width:auto}
    .auth-logo-text{font-size:20px;font-weight:700;letter-spacing:-0.3px}

    .auth-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:32px}

    .auth-title{font-size:22px;font-weight:700;margin-bottom:6px;letter-spacing:-0.3px}
    .auth-sub{font-size:13px;color:var(--text2);margin-bottom:28px}

    .btn-google{
      display:flex;align-items:center;justify-content:center;gap:10px;
      width:100%;padding:11px;border-radius:10px;
      background:transparent;border:1px solid var(--border);
      color:var(--text);font-size:14px;font-weight:500;
      cursor:pointer;transition:background 0.15s,border-color 0.15s;
      margin-bottom:24px;font-family:'Inter',sans-serif;
    }
    .btn-google:hover{background:#1F2937;border-color:#374151}

    .divider{display:flex;align-items:center;gap:12px;margin-bottom:24px}
    .divider-line{flex:1;height:1px;background:var(--border)}
    .divider-text{font-size:12px;color:var(--muted)}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;font-weight:500;color:var(--text2);margin-bottom:6px}
    .field input{
      width:100%;background:#0B0F14;border:1px solid var(--border);
      border-radius:9px;padding:10px 12px;font-size:14px;
      color:var(--text);font-family:'Inter',sans-serif;
      transition:border-color 0.15s;outline:none;
    }
    .field input:focus{border-color:var(--brand)}
    .field input::placeholder{color:var(--muted)}

    .field-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
    .field-row label{font-size:12px;font-weight:500;color:var(--text2)}
    .field-row a{font-size:12px;color:var(--brand);text-decoration:none}
    .field-row a:hover{text-decoration:underline}

    .btn-primary{
      width:100%;padding:11px;border-radius:10px;
      background:var(--brand);border:none;color:#fff;
      font-size:14px;font-weight:600;cursor:pointer;
      transition:background 0.15s;font-family:'Inter',sans-serif;
      display:flex;align-items:center;justify-content:center;gap:8px;
    }
    .btn-primary:hover{background:var(--brand-h)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed}

    .auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--text2)}
    .auth-footer a{color:var(--brand);text-decoration:none;font-weight:500}
    .auth-footer a:hover{text-decoration:underline}

    .err-msg{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);
      color:#FCA5A5;border-radius:8px;padding:10px 12px;font-size:13px;
      margin-bottom:16px;display:none}

    .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,0.3);
      border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* subtle grid bg */
    body::before{content:"";position:fixed;inset:0;
      background-image:linear-gradient(rgba(79,70,229,0.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(79,70,229,0.03) 1px,transparent 1px);
      background-size:40px 40px;pointer-events:none;z-index:0}
    .auth-wrap{position:relative;z-index:1}
  </style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-logo">
    <img src="assets/logo/logo.svg" alt="Kexo AI"
         onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div style="display:none;width:32px;height:32px;background:var(--brand);border-radius:9px;
         align-items:center;justify-content:center">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>
    </div>
    <span class="auth-logo-text">Kexo AI</span>
  </div>

  <div class="auth-card">
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-sub">Sign in to your workspace</p>

    <button class="btn-google" id="googleBtn" onclick="signInGoogle()">
      <svg width="18" height="18" viewBox="0 0 24 24">
        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
      </svg>
      Continue with Google
    </button>

    <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>

    <div class="err-msg" id="errMsg"></div>

    <div class="field">
      <label>Email address</label>
      <input type="email" id="loginEmail" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <div class="field-row">
        <label>Password</label>
        <a href="#">Forgot password?</a>
      </div>
      <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-primary" id="loginBtn" onclick="signInEmail()">
      Sign in
    </button>
  </div>

  <div class="auth-footer">
    Don't have an account? <a href="signup.html">Create one</a>
  </div>
</div>

<script src="config/config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const app  = initializeApp(KEXO_CONFIG.firebase);
  const auth = getAuth(app);
  const db   = getFirestore(app);

  onAuthStateChanged(auth, u => { if (u) window.location.href = "dashboard.html"; });

  async function ensureUserDoc(user) {
    const ref  = doc(db, "users", user.uid);
    const snap = await getDoc(ref);
    if (!snap.exists()) {
      const { setDoc, serverTimestamp } = await import("https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js");
      const kexoUID = Math.floor(1000000000 + Math.random() * 9000000000).toString();
      await setDoc(ref, {
        firstName: user.displayName?.split(" ")[0] || "",
        lastName:  user.displayName?.split(" ").slice(1).join(" ") || "",
        email: user.email,
        photoURL: user.photoURL || "",
        kexoUID,
        createdAt: serverTimestamp(),
        blocked: false,
      });
    }
  }

  function showErr(msg) {
    const el = document.getElementById("errMsg");
    el.textContent = msg;
    el.style.display = "block";
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.innerHTML = loading
      ? `<div class="spinner"></div>`
      : (btn.id === "googleBtn" ? `<svg width="18" height="18" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`
            : "Sign in");
  }

  window.signInGoogle = async () => {
    const btn = document.getElementById("googleBtn");
    setLoading(btn, true);
    try {
      const provider = new GoogleAuthProvider();
      const result   = await signInWithPopup(auth, provider);
      await ensureUserDoc(result.user);
      window.location.href = "dashboard.html";
    } catch (e) {
      showErr(e.message);
      setLoading(btn, false);
    }
  };

  window.signInEmail = async () => {
    const btn   = document.getElementById("loginBtn");
    const email = document.getElementById("loginEmail").value.trim();
    const pass  = document.getElementById("loginPass").value;
    if (!email || !pass) { showErr("Please fill in all fields."); return; }
    setLoading(btn, true);
    document.getElementById("errMsg").style.display = "none";
    try {
      await signInWithEmailAndPassword(auth, email, pass);
      window.location.href = "dashboard.html";
    } catch (e) {
      const msgs = {
        "auth/user-not-found": "No account found with this email.",
        "auth/wrong-password": "Incorrect password.",
        "auth/invalid-credential": "Invalid email or password.",
        "auth/too-many-requests": "Too many attempts. Please try again later.",
      };
      showErr(msgs[e.code] || e.message);
      setLoading(btn, false);
    }
  };

  // Enter key support
  document.addEventListener("keydown", e => {
    if (e.key === "Enter") window.signInEmail();
  });
</script>
</body>
</html>
